<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Patient Lab Dashboard</title>
  <style>
    :root {
      --bg:#f7f8fb; --panel:#fff; --ink:#171a22; --muted:#737b8b; --soft:#a4acba;
      --line:#e8ebf2; --line2:#f1f3f7; --blue:#4f5df7; --cyan:#48c9e8;
      --green:#22b573; --red:#ff5a66; --amber:#e8b24c; --shadow:0 12px 34px rgba(20,28,45,.045);
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:14px; letter-spacing:0; }
    .app { min-height:100vh; display:grid; grid-template-columns:72px minmax(1180px,1fr); }
    .rail { position:sticky; top:0; height:100vh; padding:24px 14px; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; align-items:center; gap:14px; }
    .rail button { width:40px; height:40px; border:1px solid transparent; border-radius:8px; background:transparent; color:#697284; font-size:18px; cursor:pointer; }
    .rail button.active { background:#242832; color:#fff; box-shadow:var(--shadow); }
    .rail .spacer { flex:1; }
    main { padding:28px 32px 42px; }
    .dashboard { max-width:1380px; margin:0 auto; }
    header { height:50px; display:flex; align-items:center; justify-content:space-between; gap:18px; margin-bottom:18px; }
    h1 { margin:0; font-size:22px; line-height:1.1; font-weight:760; }
    h2 { margin:0; font-size:15px; line-height:1.2; font-weight:760; }
    .date-pill { height:40px; display:inline-flex; align-items:center; gap:10px; padding:0 14px; border:1px solid var(--line); border-radius:8px; background:var(--panel); color:#5d6678; font-weight:650; white-space:nowrap; box-shadow:0 6px 18px rgba(20,28,45,.035); }
    .patient-tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .patient-tab { height:40px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:0 14px; color:#596274; font-weight:760; cursor:pointer; }
    .patient-tab.active { background:#242832; color:#fff; border-color:#242832; }
    .top-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; }
    .card-head { height:54px; padding:0 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .card-head span { color:var(--muted); font-weight:700; }
    .stat-body { padding:16px; min-height:126px; display:flex; flex-direction:column; justify-content:space-between; }
    .stat-line { display:flex; align-items:baseline; gap:10px; }
    .stat-line strong { font-size:34px; line-height:1; font-weight:760; }
    .delta { font-weight:750; color:var(--green); white-space:nowrap; }
    .delta.warn { color:var(--amber); }
    .delta.alert { color:var(--red); }
    .soft-bars { height:42px; display:flex; align-items:end; gap:6px; }
    .soft-bars i { flex:1; display:block; min-width:10px; border-radius:4px 4px 0 0; background:linear-gradient(180deg,rgba(79,93,247,.95),rgba(79,93,247,.05)); }
    .toolbar { margin-top:16px; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 16px; }
    .search { width:min(420px,100%); height:38px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:0 12px; font:inherit; }
    .section-nav { display:flex; flex-wrap:wrap; gap:8px; }
    .section-chip { height:36px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:0 11px; color:#596274; font-weight:720; cursor:pointer; }
    .section-chip.active { background:#242832; color:#fff; border-color:#242832; }
    .patient-page { display:none; }
    .patient-page.active { display:block; }
    .category-section { margin-top:16px; }
    .section-title { height:48px; display:flex; align-items:center; justify-content:space-between; gap:16px; color:var(--muted); }
    .section-title h2 { color:var(--ink); font-size:17px; }
    .freshness-section { margin-top:16px; display:grid; grid-template-columns:330px minmax(0,1fr); gap:14px; }
    .freshness-summary { padding:16px; min-height:250px; display:flex; flex-direction:column; gap:14px; }
    .freshness-summary h2 { font-size:17px; }
    .freshness-total { display:flex; align-items:baseline; gap:10px; }
    .freshness-total strong { font-size:36px; line-height:1; }
    .freshness-bar { height:14px; display:flex; overflow:hidden; border-radius:7px; background:#eef1f6; }
    .freshness-bar span { min-width:2px; }
    .freshness-due { background:var(--red); }
    .freshness-soon { background:var(--amber); }
    .freshness-fresh { background:var(--green); }
    .freshness-legend { display:grid; gap:8px; color:var(--muted); font-weight:720; }
    .freshness-legend div { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .freshness-legend i { width:8px; height:8px; display:inline-block; border-radius:50%; margin-right:7px; }
    .freshness-list { min-height:250px; }
    .mini-table { width:100%; border-collapse:collapse; table-layout:fixed; }
    .mini-table th { height:42px; padding:0 12px; color:var(--muted); text-align:left; font-size:12px; font-weight:780; border-bottom:1px solid var(--line); }
    .mini-table td { padding:10px 12px; border-bottom:1px solid var(--line2); vertical-align:top; font-weight:650; }
    .mini-table td:first-child { font-weight:780; color:#252b37; }
    .mini-table small { display:block; margin-top:3px; color:var(--muted); font-weight:650; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .matrix-section { margin-top:16px; }
    .matrix-wrap { overflow:auto; max-height:520px; }
    .matrix { min-width:980px; width:100%; border-collapse:separate; border-spacing:0; table-layout:fixed; }
    .matrix th { position:sticky; top:0; z-index:3; height:42px; padding:0 10px; background:#fbfcfe; color:var(--muted); border-bottom:1px solid var(--line); text-align:left; font-size:12px; font-weight:780; }
    .matrix td { height:48px; padding:8px 10px; border-bottom:1px solid var(--line2); font-weight:650; vertical-align:middle; }
    .matrix th:first-child, .matrix td:first-child { position:sticky; left:0; z-index:2; width:250px; background:#fff; border-right:1px solid var(--line); }
    .matrix th:first-child { z-index:4; background:#fbfcfe; }
    .matrix .trend-col { width:104px; }
    .matrix .date-col { width:112px; }
    .matrix-test { color:#252b37; font-weight:800; line-height:1.25; }
    .matrix-test small { display:block; color:var(--muted); font-weight:650; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .matrix-cell { display:flex; flex-direction:column; gap:3px; }
    .matrix-cell b { font-size:13px; line-height:1.1; overflow-wrap:anywhere; }
    .matrix-cell small { color:var(--muted); font-size:11px; }
    .spark-mini { width:84px; height:30px; display:block; }
    .status-dot { width:8px; height:8px; display:inline-block; border-radius:50%; margin-right:6px; background:#c7ceda; }
    .status-ok { background:var(--green); }
    .status-high { background:var(--red); }
    .status-low { background:var(--amber); }
    .status-text { background:#b4bdca; }
    .latest-section { margin-top:16px; }
    .latest-category-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .latest-category { min-height:180px; }
    .latest-category-head { height:50px; padding:0 14px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .latest-category-head h3 { margin:0; font-size:15px; line-height:1.2; font-weight:780; color:#252b37; }
    .latest-category-head span { color:var(--muted); font-weight:720; white-space:nowrap; }
    .latest-list { display:grid; }
    .latest-row { display:grid; grid-template-columns:minmax(0,1.35fr) minmax(120px,.85fr) 94px 64px; gap:10px; align-items:center; min-height:42px; padding:8px 14px; border-bottom:1px solid var(--line2); }
    .latest-row:last-child { border-bottom:0; }
    .latest-name { min-width:0; font-weight:760; color:#252b37; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .latest-result { min-width:0; font-weight:780; overflow-wrap:anywhere; }
    .latest-date { color:var(--muted); font-size:12px; font-weight:760; white-space:nowrap; }
    .analysis-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
    .analysis-card { min-height:262px; display:flex; flex-direction:column; }
    .analysis-head { padding:14px 15px 10px; border-bottom:1px solid var(--line2); min-height:86px; }
    .analysis-name { margin:0 0 7px; font-size:15px; line-height:1.25; font-weight:780; color:#242936; }
    .analysis-meta { display:flex; align-items:center; justify-content:space-between; gap:10px; color:var(--muted); font-weight:650; }
    .latest { padding:12px 15px 6px; display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
    .latest strong { font-size:26px; line-height:1; }
    .latest small { color:var(--muted); font-weight:700; }
    .spark { height:76px; margin:0 15px; }
    .spark svg { width:100%; height:76px; display:block; overflow:visible; }
    .timeline { margin-top:auto; padding:10px 15px 14px; display:flex; gap:8px; overflow-x:auto; border-top:1px solid var(--line2); }
    .point { min-width:86px; padding:8px 9px; border:1px solid var(--line); border-radius:8px; background:#fbfcfe; }
    .point b { display:block; font-size:13px; margin-bottom:4px; }
    .point span { display:block; color:var(--muted); font-size:12px; font-weight:700; }
    .badge { display:inline-flex; align-items:center; min-height:24px; padding:3px 8px; border-radius:6px; font-weight:760; }
    .badge-ok { background:rgba(34,181,115,.12); color:#159064; }
    .badge-high { background:rgba(255,90,102,.12); color:#d1454f; }
    .badge-low { background:rgba(232,178,76,.16); color:#a87819; }
    .badge-text { background:#eef1f6; color:#626b7c; }
    .empty { padding:24px; color:var(--muted); }
    @media (max-width:1180px) {
      .app { grid-template-columns:1fr; }
      .rail { display:none; }
      main { padding:18px 14px; }
      .dashboard { max-width:none; }
      .top-grid, .freshness-section, .latest-category-grid, .analysis-grid { grid-template-columns:1fr; }
      .latest-row { grid-template-columns:minmax(0,1fr); gap:4px; align-items:start; }
      header, .toolbar { align-items:flex-start; flex-direction:column; }
      .search { width:100%; }
    }
  </style>
</head>

    }
    function bindPageControls() {
      document.querySelectorAll('.section-chip').forEach(btn => btn.addEventListener('click', () => {
        const page = document.querySelector('.patient-page.active');
        page.querySelectorAll('.section-chip').forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        activeSection = btn.dataset.section;
        filterPage();
      }));
      document.querySelectorAll('.search').forEach(input => input.addEventListener('input', () => {
        query = input.value.trim().toLowerCase();
        filterPage();
      }));
    }
    function filterPage() {
      const page = document.querySelector('.patient-page.active');
      if (!page) return;
      page.querySelectorAll('.latest-category').forEach(category => {
        const sectionOk = activeSection === 'all' || category.dataset.category === activeSection;
        let visibleRows = 0;
        category.querySelectorAll('.latest-row').forEach(row => {
          const queryOk = !query || row.dataset.search.includes(query);
          const show = sectionOk && queryOk;
          row.style.display = show ? '' : 'none';
          if (show) visibleRows += 1;
        });
        category.style.display = visibleRows ? '' : 'none';
      });
      page.querySelectorAll('.freshness-row').forEach(row => {
        const sectionOk = activeSection === 'all' || row.dataset.category === activeSection;
        const queryOk = !query || row.dataset.search.includes(query);
        row.style.display = sectionOk && queryOk ? '' : 'none';
      });
      page.querySelectorAll('.matrix-row').forEach(row => {
        const sectionOk = activeSection === 'all' || row.dataset.category === activeSection;
        const queryOk = !query || row.dataset.search.includes(query);
        row.style.display = sectionOk && queryOk ? '' : 'none';
      });
      page.querySelectorAll('.category-section').forEach(section => {
        const sectionOk = activeSection === 'all' || section.dataset.category === activeSection;
        let visibleCards = 0;
        section.querySelectorAll('.analysis-card').forEach(card => {
          const queryOk = !query || card.dataset.search.includes(query);
          const show = sectionOk && queryOk;
          card.style.display = show ? '' : 'none';
          if (show) visibleCards += 1;
        });
        section.style.display = visibleCards ? '' : 'none';
      });
    }
    tabs.forEach(tab => tab.addEventListener('click', () => {
      tabs.forEach(item => item.classList.remove('active'));
      tab.classList.add('active');
      activePatient = Number(tab.dataset.patient);
      activeSection = 'all';
      query = '';
      document.querySelectorAll('.patient-page').forEach(page => page.classList.remove('active'));
      document.querySelector('.patient-page[data-page="' + activePatient + '"]').classList.add('active');
      const page = document.querySelector('.patient-page.active');
      page.querySelector('.search').value = '';
      page.querySelectorAll('.section-chip').forEach((chip, idx) => chip.classList.toggle('active', idx === 0));
      filterPage();
    }));
    render();
  </script>
</body>
</html>
