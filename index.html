<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab Biomarker Dashboard</title>
  <style>
    :root {
      --bg:#f7f8fb; --panel:#fff; --ink:#141925; --muted:#758198; --soft:#99a4b7;
      --line:#e6eaf1; --line2:#f0f3f7; --blue:#2563eb; --teal:#06b6d4;
      --green:#10b981; --red:#ef4444; --amber:#f59e0b; --violet:#7c3aed;
      --shadow:0 8px 22px rgba(20,29,45,.035);
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:13px; letter-spacing:0; }
    button, input, select { font:inherit; letter-spacing:0; }
    .app { min-height:100vh; display:grid; grid-template-columns:232px minmax(980px,1fr); }
    .rail { position:sticky; top:0; height:100vh; padding:14px 12px; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; gap:10px; }
    .brand { height:38px; display:flex; align-items:center; gap:10px; margin-bottom:12px; }
    .brand-mark { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; background:var(--blue); color:#fff; font-weight:850; }
    .brand b { display:block; font-size:13px; }
    .brand span { display:block; color:var(--muted); font-size:11px; font-weight:700; }
    .nav-label { margin:10px 0 3px; color:#8190a8; font-size:11px; font-weight:820; }
    .rail button { width:100%; height:34px; border:1px solid transparent; border-radius:7px; background:transparent; color:#222938; font-weight:760; cursor:pointer; display:flex; align-items:center; gap:9px; padding:0 10px; text-align:left; }
    .rail button i { width:18px; color:#1f2937; font-style:normal; font-size:15px; text-align:center; }
    .rail button.active { background:#f0f2f6; color:#141925; box-shadow:none; }
    .rail .spacer { flex:1; }
    main { padding:14px 16px 28px; min-width:0; }
    .dashboard { max-width:none; margin:0 auto; }
    header { min-height:42px; display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
    h1 { margin:0; font-size:18px; line-height:1.1; font-weight:820; }
    h2 { margin:0; font-size:14px; line-height:1.2; font-weight:820; }
    h3 { margin:0; font-size:13px; line-height:1.25; font-weight:800; }
    .date-pill { height:30px; display:inline-flex; align-items:center; gap:7px; padding:0 10px; border:1px solid var(--line); border-radius:7px; background:var(--panel); color:#5d687c; font-weight:720; white-space:nowrap; box-shadow:none; }
    .toolbar { min-height:42px; display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .patient-tabs, .mode-tabs, .category-tabs { display:flex; flex-wrap:wrap; gap:6px; }
    .patient-tabs { margin:0 6px 0 0; }
    .patient-tab, .mode-tab, .category-chip { height:30px; border:1px solid var(--line); border-radius:7px; background:#fff; color:#526078; padding:0 10px; font-weight:760; cursor:pointer; }
    .patient-tab.active, .mode-tab.active, .category-chip.active { background:#111827; border-color:#111827; color:#fff; }
    .control-row { margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .search { width:min(360px,100%); height:30px; border:1px solid var(--line); border-radius:7px; background:#fff; padding:0 10px; color:var(--ink); }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; }
    .card-head { min-height:38px; padding:0 12px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .card-head span { color:var(--muted); font-weight:720; font-size:12px; }
    .patient-page { display:none; }
    .patient-page.active { display:block; }
    .mode-panel { display:none; }
    .mode-panel.active { display:block; }
    .top-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .stat-card { min-height:92px; padding:10px 12px; display:flex; flex-direction:column; justify-content:space-between; gap:8px; }
    .stat-label { color:var(--muted); font-size:11px; font-weight:820; text-transform:uppercase; }
    .stat-value { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    .stat-value strong { font-size:24px; line-height:1; font-weight:820; }
    .delta { font-weight:780; color:var(--green); }
    .delta.warn { color:var(--amber); }
    .delta.alert { color:var(--red); }
    .status-track { height:8px; border-radius:5px; overflow:hidden; background:#eef1f6; display:flex; }
    .status-track span { min-width:2px; }
    .st-ok { background:var(--green); } .st-high { background:var(--red); } .st-low { background:var(--amber); } .st-text { background:#b5bdca; }
    .overview-grid { margin-top:8px; display:grid; grid-template-columns:minmax(0,1.5fr) minmax(320px,.72fr); gap:8px; align-items:start; }
    .system-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; padding:8px; }
    .system-card { border:1px solid var(--line); border-radius:7px; background:#fbfcfe; padding:10px; min-height:94px; }
    .system-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .system-head b { font-size:13px; }
    .system-score { font-size:18px; font-weight:820; }
    .system-meta { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; color:var(--muted); font-size:11px; font-weight:720; }
    .system-meta strong { display:block; margin-bottom:2px; color:var(--ink); font-size:12px; }
    .action-list { display:grid; }
    .action-item { display:grid; grid-template-columns:18px minmax(0,1fr) auto; gap:8px; align-items:center; min-height:42px; padding:7px 10px; border-bottom:1px solid var(--line2); }
    .action-item:last-child { border-bottom:0; }
    .action-dot { width:10px; height:10px; border-radius:50%; background:var(--blue); }
    .action-title { font-size:12px; font-weight:800; color:#252b37; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .action-sub { display:block; margin-top:2px; color:var(--muted); font-size:11px; font-weight:680; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .changes-grid { margin-top:8px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    .change-list { max-height:282px; overflow:auto; }
    .change-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:8px; align-items:center; min-height:40px; padding:7px 10px; border-bottom:1px solid var(--line2); }
    .change-row:last-child { border-bottom:0; }
    .change-name { font-size:12px; font-weight:780; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .change-sub { display:block; color:var(--muted); font-size:11px; font-weight:650; margin-top:2px; }
    .biomarker-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .biomarker-card { min-height:174px; display:flex; flex-direction:column; cursor:pointer; transition:transform .12s ease, border-color .12s ease; }
    .biomarker-card:hover { transform:translateY(-1px); border-color:#d8ddea; }
    .biomarker-top { padding:10px 11px 7px; min-height:58px; border-bottom:1px solid var(--line2); }
    .biomarker-name { margin:0 0 6px; font-size:13px; line-height:1.22; font-weight:800; color:#242936; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .biomarker-meta { display:flex; align-items:center; justify-content:space-between; gap:8px; color:var(--muted); font-size:11px; font-weight:720; min-width:0; }
    .latest { padding:8px 11px 2px; display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
    .latest strong { font-size:17px; line-height:1; overflow-wrap:anywhere; }
    .latest small { color:var(--muted); font-size:11px; font-weight:760; white-space:nowrap; }
    .spark { height:48px; margin:0 11px; }
    .spark svg { width:100%; height:48px; display:block; overflow:visible; }
    .card-timeline { display:none; }
    .point { min-width:74px; border:1px solid var(--line); border-radius:7px; background:#fbfcfe; padding:6px 7px; }
    .point b { display:block; margin-bottom:2px; font-size:11px; }
    .point span { display:block; color:var(--muted); font-size:11px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .badge { display:inline-flex; align-items:center; justify-content:center; min-height:20px; border-radius:6px; padding:2px 6px; font-size:11px; font-weight:820; white-space:nowrap; }
    .badge-ok { background:rgba(35,169,111,.12); color:#16875a; }
    .badge-high { background:rgba(233,90,100,.13); color:#c6444d; }
    .badge-low { background:rgba(215,154,43,.17); color:#946713; }
    .badge-text { background:#eef1f6; color:#626b7c; }
    .table-wrap { overflow:auto; max-height:650px; }
    table { width:100%; border-collapse:separate; border-spacing:0; }
    th { position:sticky; top:0; z-index:2; height:34px; padding:0 10px; border-bottom:1px solid var(--line); background:#fbfcfe; color:var(--muted); text-align:left; font-size:11px; font-weight:820; }
    td { padding:7px 10px; border-bottom:1px solid var(--line2); vertical-align:middle; font-weight:650; color:#3f4858; }
    .test-cell { min-width:280px; color:#242936; font-weight:790; }
    .muted { display:block; margin-top:3px; color:var(--muted); font-size:12px; font-weight:650; }
    .timeline-panel { display:grid; gap:12px; }
    .date-group { display:grid; grid-template-columns:150px minmax(0,1fr); gap:12px; }
    .date-stamp { position:sticky; top:12px; height:76px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:12px; box-shadow:var(--shadow); }
    .date-stamp strong { display:block; font-size:18px; }
    .date-stamp span { color:var(--muted); font-weight:720; }
    .date-items { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; }
    .date-item { border:1px solid var(--line); border-radius:8px; background:#fff; padding:11px; min-height:82px; }
    .date-item b { display:block; margin-bottom:7px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .graph-layout { display:grid; grid-template-columns:300px minmax(0,1fr); gap:8px; }
    .marker-list { max-height:720px; overflow:auto; }
    .marker-button { width:100%; min-height:42px; padding:7px 10px; border:0; border-bottom:1px solid var(--line2); background:#fff; text-align:left; cursor:pointer; }
    .marker-button.active { background:#f4f6ff; }
    .marker-button b { display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .marker-button span { display:block; margin-top:3px; color:var(--muted); font-size:12px; font-weight:650; }
    .graph-card { min-height:470px; padding:14px; }
    .graph-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .graph-title b { display:block; font-size:16px; margin-bottom:4px; }
    .graph-title span { color:var(--muted); font-weight:700; }
    .big-chart { width:100%; height:330px; display:block; overflow:visible; }
    .graph-table { margin-top:14px; max-height:220px; overflow:auto; border:1px solid var(--line); border-radius:8px; }
    .empty { padding:24px; color:var(--muted); font-weight:700; }
    .view-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:10px 0; }
    .view-head h2 { font-size:15px; }
    @media (max-width:1180px) {
      .app { display:block; }
      .rail { display:none; }
      main { padding:18px 14px; }
      .dashboard { max-width:none; }
      header, .control-row, .view-head { align-items:flex-start; flex-direction:column; }
      .top-grid, .overview-grid, .changes-grid, .biomarker-grid, .date-items, .graph-layout, .system-grid { grid-template-columns:1fr; }
      .date-group { grid-template-columns:1fr; }
      .search { width:100%; }
      .table-wrap { max-height:none; }
      th:nth-child(5), td:nth-child(5), th:nth-child(6), td:nth-child(6) { display:none; }
    }
  </style>
</head>

        </div>
        <div id="categoryTabs" class="category-tabs"></div>
        <div id="pages"></div>
      </div>
    </main>

        groups.get(name).push(item);
      });
      const cards = [...groups.entries()].sort((a,b) => healthScore(b[1]) - healthScore(a[1])).map(([name, items]) => {
        const highLow = items.filter(item => item.latestStatus === 'high' || item.latestStatus === 'low').length;
        const dynamic = items.filter(item => item.hasDynamics).length;
        const fresh = items.filter(item => freshness(item).state === 'fresh').length;
        return '<article class="system-card"><div class="system-head"><b>' + esc(name) + '</b><span class="system-score">' + healthScore(items) + '</span></div><div class="status-track"><span class="st-ok" style="width:' + (healthScore(items)).toFixed(1) + '%"></span></div><div class="system-meta"><div><strong>' + items.length + '</strong>markers</div><div><strong>' + highLow + '</strong>out</div><div><strong>' + dynamic + '</strong>trends</div></div></article>';
      }).join('');
      return '<article class="card"><div class="card-head"><h2>Health Systems</h2><span>score by marker status</span></div><div class="system-grid">' + cards + '</div></article>';
    }
    function actionPlan(patient) {
      const due = allAnalyses(patient).filter(isRefreshCandidate).map(item => Object.assign({}, item, { fresh:freshness(item) })).filter(item => item.fresh.state !== 'fresh').sort((a,b) => b.fresh.age - a.fresh.age);
      const out = allAnalyses(patient).filter(item => item.latestStatus === 'high' || item.latestStatus === 'low').sort((a,b) => (b.latestDate || '').localeCompare(a.latestDate || ''));
      const items = [...due.slice(0, 5), ...out.slice(0, 5)].slice(0, 9);
      const rows = items.map(item => {
        const isDue = item.fresh && item.fresh.state !== 'fresh';
        const dotClass = isDue ? 'background:var(--amber)' : item.latestStatus === 'high' ? 'background:var(--red)' : 'background:var(--blue)';
        const status = isDue ? 'сдать свежее' : statusLabel(item.latestStatus);
        return '<div class="action-item"><span class="action-dot" style="' + dotClass + '"></span><div><div class="action-title">' + esc(item.testName) + '</div><span class="action-sub">' + esc(item.category) + ' · ' + esc(item.latestDate) + ' · ' + esc(((item.latestResult || '') + ' ' + (item.unit || '')).trim()) + '</span></div>' + badge(isDue ? 'low' : item.latestStatus) + '</div>';
      }).join('');
      return '<article class="card"><div class="card-head"><h2>Action Plan</h2><span>retest + out of range</span></div><div class="action-list">' + (rows || '<div class="empty">Нет срочных пунктов по текущей логике.</div>') + '</div></article>';
    }
    function changesCard(patient) {
      const changed = allAnalyses(patient).filter(item => numericPoints(item).length >= 2).map(item => Object.assign({}, item, { trend:trend(item) })).filter(item => item.trend.label !== 'stable').sort((a,b) => Math.abs(b.trend.diff || 0) - Math.abs(a.trend.diff || 0)).slice(0, 10);
      const rows = changed.map(item => {
        const points = numericPoints(item);
        const first = points[0];
        const last = points[points.length - 1];
        const sign = item.trend.label === 'up' ? '+' : '';
        return '<div class="change-row"><div><div class="change-name">' + esc(item.testName) + '</div><span class="change-sub">' + esc(first.date) + ': ' + esc(first.result) + ' → ' + esc(last.date) + ': ' + esc(last.result) + '</span></div><span class="delta ' + esc(item.trend.cls) + '">' + sign + (item.trend.diff || 0).toFixed(0) + '%</span></div>';
      }).join('');
      return '<article class="card"><div class="card-head"><h2>Что изменилось</h2><span>largest moves</span></div><div class="change-list">' + (rows || '<div class="empty">Недостаточно динамики для сравнения.</div>') + '</div></article>';
    }
    function overview(patient) {
      return topCards(patient) + '<section class="overview-grid">' + systemCards(patient) + actionPlan(patient) + '</section><section class="changes-grid">' + changesCard(patient) + fertilityCard(patient) + latestBatchCard(patient) + '</section>';
    }
    function latestMatching(patient, pattern) {
      return allAnalyses(patient).filter(item => pattern.test((item.testName || '').toLowerCase())).sort((a,b) => (b.latestDate || '').localeCompare(a.latestDate || ''))[0] || null;
    }
    function fertilityCard(patient) {
      const targets = [
        ['Прогестерон', /прогестерон/],
        ['ХГЧ', /хгч/],
        ['АМГ', /антимюллер|амг|amh/],
        ['Андростендион', /андростендион/],
        ['Тестостерон', /тестостерон/],
        ['ГСПГ', /гспг|глобулин, связывающий/],
      ];
      const rows = targets.map(([label, pattern]) => {
        const item = latestMatching(patient, pattern);
        return '<div class="change-row"><div><div class="change-name">' + esc(label) + '</div><span class="change-sub">' + (item ? esc(item.latestDate + ' · ' + ((item.latestResult || '') + ' ' + (item.unit || '')).trim()) : 'нет данных') + '</span></div>' + (item ? badge(item.latestStatus) : '<span class="badge badge-text">none</span>') + '</div>';
      }).join('');
      return '<article class="card"><div class="card-head"><h2>Фертильность</h2><span>cycle markers</span></div><div class="change-list">' + rows + '</div></article>';
    }
    function latestBatchCard(patient) {
      const date = latestDateFor(patient);
      const rows = allAnalyses(patient).filter(item => item.latestDate === date).slice(0, 12).map(item => '<div class="change-row"><div><div class="change-name">' + esc(item.testName) + '</div><span class="change-sub">' + esc(item.category) + ' · ' + esc(((item.latestResult || '') + ' ' + (item.unit || '')).trim()) + '</span></div>' + badge(item.latestStatus) + '</div>').join('');
      return '<article class="card"><div class="card-head"><h2>Последний пакет</h2><span>' + esc(date) + '</span></div><div class="change-list">' + rows + '</div></article>';
    }
    function spark(item, big=false) {
      const points = numericPoints(item);
      const ref = parseRef(item.latestReference);
      const width = big ? 820 : 320;
      const height = big ? 300 : 82;
      if (points.length < 2) return '<svg viewBox="0 0 ' + width + ' ' + height + '"><text x="12" y="' + (height/2) + '" fill="#7a8495" font-size="13" font-weight="700">single result</text></svg>';
      let values = points.map(p => p.value);
      if (ref) { if (ref.lo !== null) values.push(ref.lo); if (ref.hi !== null) values.push(ref.hi); }
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = max - min || 1;
      const xFor = i => 16 + i * ((width - 32) / Math.max(points.length - 1, 1));
      const yFor = v => 14 + (1 - ((v - min) / span)) * (height - 34);
      const band = ref && ref.lo !== null && ref.hi !== null ? '<rect x="8" y="' + yFor(ref.hi).toFixed(1) + '" width="' + (width-16) + '" height="' + Math.max(4, yFor(ref.lo)-yFor(ref.hi)).toFixed(1) + '" rx="6" fill="rgba(35,169,111,.12)"></rect>' : '';
      const grid = '<path d="M8 ' + (height*.25).toFixed(1) + 'H' + (width-8) + ' M8 ' + (height*.5).toFixed(1) + 'H' + (width-8) + ' M8 ' + (height*.75).toFixed(1) + 'H' + (width-8) + '" stroke="#eef1f6"></path>';
      const poly = points.map((p,i) => xFor(i).toFixed(1) + ',' + yFor(p.value).toFixed(1)).join(' ');
      const circles = points.map((p,i) => '<circle cx="' + xFor(i).toFixed(1) + '" cy="' + yFor(p.value).toFixed(1) + '" r="' + (big ? 5 : 3.5) + '" fill="#4f5df7"><title>' + esc(p.date + ': ' + p.result) + '</title></circle>').join('');
      return '<svg viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">' + band + grid + '<polyline points="' + poly + '" fill="none" stroke="#4f5df7" stroke-width="' + (big ? 4 : 3) + '" stroke-linecap="round" stroke-linejoin="round"></polyline>' + circles + '</svg>';
    }
    function biomarkerCard(item) {
      const latest = ((item.latestResult || '') + ' ' + (item.unit || '')).trim();
      const tr = trend(item);
      const points = item.points.slice(-4).map(p => '<div class="point"><b>' + esc(p.date) + '</b><span>' + esc(((p.result || '') + ' ' + (p.unit || '')).trim()) + '</span></div>').join('');
      const key = item.category + '|' + item.testName + '|' + item.unit;
      return '<article class="card biomarker-card" data-key="' + esc(key) + '" data-category="' + esc(item.category) + '" data-search="' + esc((item.testName + ' ' + item.category + ' ' + latest + ' ' + item.latestReference).toLowerCase()) + '">' +
        '<div class="biomarker-top"><h3 class="biomarker-name">' + esc(item.testName) + '</h3><div class="biomarker-meta"><span>' + esc(item.category) + '</span>' + badge(item.latestStatus) + '</div></div>' +
        '<div class="latest"><strong>' + esc(latest) + '</strong><small>' + esc(item.latestDate) + '</small></div><div class="spark">' + spark(item) + '</div>' +
        '<div class="biomarker-meta" style="padding:0 15px 8px"><span>ref: ' + esc(item.latestReference || 'none') + '</span><span class="delta ' + esc(tr.cls) + '">' + esc(tr.label) + '</span></div>' +
        '<div class="card-timeline">' + points + '</div></article>';
    }
    function cardsView(patient) {
      const rows = visibleAnalyses(patient).map(biomarkerCard).join('');
      return '<div class="view-head"><h2>Biomarkers</h2><span class="date-pill">' + visibleAnalyses(patient).length + ' visible</span></div><section class="biomarker-grid">' + (rows || '<article class="card empty">Ничего не найдено.</article>') + '</section>';
    }
    function tableView(patient) {
      const rows = visibleAnalyses(patient).map(item => '<tr><td class="test-cell">' + esc(item.testName) + '<span class="muted">' + esc(item.category) + '</span></td><td>' + esc(item.latestDate) + '</td><td><b>' + esc(((item.latestResult || '') + ' ' + (item.unit || '')).trim()) + '</b></td><td>' + badge(item.latestStatus) + '</td><td>' + esc(item.latestReference || '') + '</td><td>' + esc(item.points.map(p => p.date + ': ' + p.result).join('; ')) + '</td></tr>').join('');
      return '<div class="view-head"><h2>Table</h2><span class="date-pill">all values by dates</span></div><section class="card"><div class="table-wrap"><table><thead><tr><th>Analysis</th><th>Latest date</th><th>Latest result</th><th>Status</th><th>Reference</th><th>History</th></tr></thead><tbody>' + rows + '</tbody></table></div></section>';
    }
    function timelineView(patient) {
      const buckets = new Map();
      visibleAnalyses(patient).forEach(item => item.points.forEach(point => {
        if (!buckets.has(point.date)) buckets.set(point.date, []);
        buckets.get(point.date).push({ item, point });
      }));
      const blocks = [...buckets.entries()].sort((a,b) => b[0].localeCompare(a[0])).map(([date, rows]) => '<section class="date-group"><aside class="date-stamp"><strong>' + esc(date) + '</strong><span>' + rows.length + ' values</span></aside><div class="date-items">' + rows.slice(0, 60).map(row => '<article class="date-item"><b>' + esc(row.item.testName) + '</b><span class="muted">' + esc(row.item.category) + '</span><div>' + esc(((row.point.result || '') + ' ' + (row.point.unit || '')).trim()) + '</div></article>').join('') + '</div></section>').join('');
      return '<div class="view-head"><h2>Timeline</h2><span class="date-pill">history by lab date</span></div><div class="timeline-panel">' + blocks + '</div>';
    }
    function selectedAnalysis(patient) {
      const analyses = visibleAnalyses(patient).filter(item => numericPoints(item).length > 0);
      if (!selectedKey && analyses.length) selectedKey = analyses[0].category + '|' + analyses[0].testName + '|' + analyses[0].unit;
      return analyses.find(item => (item.category + '|' + item.testName + '|' + item.unit) === selectedKey) || analyses[0] || null;
    }
    function graphView(patient) {
      const analyses = visibleAnalyses(patient).filter(item => numericPoints(item).length > 0);
      const selected = selectedAnalysis(patient);
      const buttons = analyses.map(item => {
        const key = item.category + '|' + item.testName + '|' + item.unit;
        return '<button class="marker-button' + (selected && key === (selected.category + '|' + selected.testName + '|' + selected.unit) ? ' active' : '') + '" data-key="' + esc(key) + '"><b>' + esc(item.testName) + '</b><span>' + esc(item.category) + ' · ' + esc(((item.latestResult || '') + ' ' + (item.unit || '')).trim()) + '</span></button>';
      }).join('');
      if (!selected) return '<div class="empty">Нет числовых маркеров для графика.</div>';
      const rows = selected.points.map(p => '<tr><td>' + esc(p.date) + '</td><td><b>' + esc(((p.result || '') + ' ' + (p.unit || '')).trim()) + '</b></td><td>' + badge(p.status) + '</td><td>' + esc(p.reference || '') + '</td></tr>').join('');
      return '<div class="view-head"><h2>Graph</h2><span class="date-pill">selected biomarker</span></div><section class="graph-layout"><article class="card marker-list">' + buttons + '</article><article class="card graph-card"><div class="graph-head"><div class="graph-title"><b>' + esc(selected.testName) + '</b><span>' + esc(selected.category) + ' · ref ' + esc(selected.latestReference || 'none') + '</span></div>' + badge(selected.latestStatus) + '</div><div class="big-chart">' + spark(selected, true) + '</div><div class="graph-table"><table><thead><tr><th>Date</th><th>Result</th><th>Status</th><th>Reference</th></tr></thead><tbody>' + rows + '</tbody></table></div></article></section>';
    }
    function renderCategoryTabs(patient) {
      const tabs = ['<button class="category-chip active" data-category="all">All categories</button>'].concat(patient.categories.map(c => '<button class="category-chip" data-category="' + esc(c.name) + '">' + esc(c.name) + ' · ' + c.count + '</button>')).join('');
      categoryTabs.innerHTML = tabs;
      categoryTabs.querySelectorAll('.category-chip').forEach(btn => btn.addEventListener('click', () => {
        categoryTabs.querySelectorAll('.category-chip').forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.category;
        selectedKey = '';
        renderPages();
      }));
    }
    function pageHtml(patient, index) {
      return '<div class="patient-page' + (index === activePatient ? ' active' : '') + '" data-page="' + index + '">' +
        '<section class="mode-panel ' + (activeMode === 'overview' ? 'active' : '') + '">' + overview(patient) + '</section>' +
        '<section class="mode-panel ' + (activeMode === 'cards' ? 'active' : '') + '">' + cardsView(patient) + '</section>' +
        '<section class="mode-panel ' + (activeMode === 'table' ? 'active' : '') + '">' + tableView(patient) + '</section>' +
        '<section class="mode-panel ' + (activeMode === 'timeline' ? 'active' : '') + '">' + timelineView(patient) + '</section>' +
        '<section class="mode-panel ' + (activeMode === 'graph' ? 'active' : '') + '">' + graphView(patient) + '</section>' +
      '</div>';
    }
    function renderPages() {
      pagesEl.innerHTML = data.patients.map(pageHtml).join('');
      railModeButtons.forEach(button => button.classList.toggle('active', button.dataset.railMode === activeMode));
      document.querySelectorAll('.biomarker-card').forEach(card => card.addEventListener('click', () => {
        selectedKey = card.dataset.key;
        activeMode = 'graph';
        modeTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.mode === activeMode));
        railModeButtons.forEach(button => button.classList.toggle('active', button.dataset.railMode === activeMode));
        renderPages();
      }));
      document.querySelectorAll('.marker-button').forEach(button => button.addEventListener('click', () => {
        selectedKey = button.dataset.key;
        renderPages();
      }));
    }
    function renderAll() {
      renderCategoryTabs(currentPatient());
      renderPages();
    }
    patientTabs.forEach(tab => tab.addEventListener('click', () => {
      patientTabs.forEach(item => item.classList.remove('active'));
      tab.classList.add('active');
      activePatient = Number(tab.dataset.patient);
      activeCategory = 'all';
      query = '';
      selectedKey = '';
      searchInput.value = '';
      renderAll();
    }));
    modeTabs.forEach(tab => tab.addEventListener('click', () => {
      modeTabs.forEach(item => item.classList.remove('active'));
      tab.classList.add('active');
      activeMode = tab.dataset.mode;
      renderPages();
    }));
    railModeButtons.forEach(button => button.addEventListener('click', () => {
      activeMode = button.dataset.railMode;
      modeTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.mode === activeMode));
      railModeButtons.forEach(item => item.classList.toggle('active', item.dataset.railMode === activeMode));
      renderPages();
    }));
    searchInput.addEventListener('input', () => {
      query = searchInput.value.trim().toLowerCase();
      selectedKey = '';
      renderPages();
    });
    renderAll();
  </script>
</body>
</html>
